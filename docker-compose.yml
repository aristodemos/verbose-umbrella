services:
  vllm-surya:
    image: vllm/vllm-openai:cu130-nightly
    container_name: vllm-surya
    restart: unless-stopped

    ports:
      - "8000:8000"

    ipc: host
    shm_size: "32g"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface

    environment:
      HF_TOKEN: ${HF_TOKEN}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      HF_HUB_OFFLINE: 1
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    gpus: all

    command:
      - --model
      - datalab-to/surya-ocr-2
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.70"
      - --trust-remote-code
      
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s


